services:
  app:
    build: .
    volumes:
      - ./model:/app/model
      - ./data:/app/data
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
